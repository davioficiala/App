


<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>🧠 Brain Firebase</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Arial, sans-serif;
  background: #f6f8fa; color: #1f2328;
  min-height: 100vh; display: flex; flex-direction: column;
  align-items: center; padding: 40px 16px;
}
.header { display: flex; align-items: center; gap: 12px; margin-bottom: 28px; }
.header-icon { width: 40px; height: 40px; background: #1f2328; border-radius: 50%;
  display: flex; align-items: center; justify-content: center; font-size: 18px; }
.header-title { font-size: 20px; font-weight: 600; }
.header-sub { font-size: 12px; color: #656d76; margin-top: 2px; }
.card { width: 100%; max-width: 480px; background: #fff;
  border: 1px solid #d0d7de; border-radius: 12px; overflow: hidden;
  box-shadow: 0 1px 3px rgba(31,35,40,0.06); }
.card-header { background: #f6f8fa; border-bottom: 1px solid #d0d7de;
  padding: 14px 20px; font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
.card-body { padding: 20px; display: flex; flex-direction: column; gap: 16px; }
.field label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 6px; }
.field label .opt { color: #656d76; font-weight: 400; }
.input-wrap { position: relative; }
.input-wrap .icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
  color: #818b99; font-size: 14px; pointer-events: none; }
.input-wrap input { width: 100%; padding: 8px 12px 8px 32px;
  border: 1px solid #d0d7de; border-radius: 6px; background: #fff;
  font-size: 14px; outline: none; transition: border-color .15s, box-shadow .15s; }
.input-wrap input::placeholder { color: #818b99; }
.input-wrap input:focus { border-color: #0969da; box-shadow: 0 0 0 3px rgba(9,105,218,0.2); }
.error-msg { color: #cf222e; font-size: 12px; margin-top: 6px; display: none; }
.error-msg.show { display: block; }
.tipo-group { display: flex; gap: 8px; }
.tipo-btn { flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px;
  padding: 8px; border: 1px solid #d0d7de; border-radius: 6px;
  background: #fff; color: #656d76; font-size: 12px; font-weight: 600; cursor: pointer; }
.tipo-btn.active { background: #1f2328; border-color: #1f2328; color: #fff; }
.tipo-dot { width: 8px; height: 8px; border-radius: 50%; }
.tipo-btn[data-tipo="entrada"] .tipo-dot { background: #1a7f37; }
.tipo-btn[data-tipo="saida"]   .tipo-dot { background: #cf222e; }
.tipo-btn[data-tipo="estudo"]  .tipo-dot { background: #0969da; }
.tipo-btn.active .tipo-dot { background: #fff; }
.card-footer { background: #f6f8fa; border-top: 1px solid #d0d7de;
  padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; }
.success-msg { display: flex; align-items: center; gap: 6px;
  color: #1a7f37; font-size: 12px; font-weight: 600; opacity: 0; transition: opacity .3s; }
.success-msg.show { opacity: 1; }
.btn-save { display: flex; align-items: center; gap: 6px; padding: 7px 16px;
  background: #2da44e; color: #fff; border: 1px solid rgba(31,35,40,0.15);
  border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; }
.btn-save:hover { background: #2c974b; }
.btn-save:disabled { opacity: .6; cursor: not-allowed; }
.spinner { width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3);
  border-top-color: #fff; border-radius: 50%; animation: spin .6s linear infinite; display: none; }
@keyframes spin { to { transform: rotate(360deg); } }
.footer-note { margin-top: 24px; font-size: 12px; color: #818b99; }
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">🧠</div>
  <div>
    <div class="header-title">Brain Firebase</div>
    <div class="header-sub">brain-orcamento · dados</div>
  </div>
</div>

<div class="card">
  <div class="card-header">＋ Adicionar dados</div>
  <div class="card-body">
    <div class="field">
      <label>Título <span style="color:#cf222e">*</span></label>
      <div class="input-wrap">
        <span class="icon">🏷</span>
        <input id="titulo" type="text" placeholder="Ex: Compra supermercado">
      </div>
      <div class="error-msg" id="erro">⚠ Digite um título para continuar.</div>
    </div>
    <div class="field">
      <label>Valor <span class="opt">(opcional)</span></label>
      <div class="input-wrap">
        <span class="icon">$</span>
        <input id="valor" type="number" placeholder="0.00">
      </div>
    </div>
    <div class="field">
      <label>Link <span class="opt">(opcional)</span></label>
      <div class="input-wrap">
        <span class="icon">🔗</span>
        <input id="link" type="url" placeholder="https://...">
      </div>
    </div>
    <div class="field">
      <label>Tipo</label>
      <div class="tipo-group">
        <button class="tipo-btn active" data-tipo="entrada" onclick="selecionarTipo(this)">
          <span class="tipo-dot"></span> Entrada
        </button>
        <button class="tipo-btn" data-tipo="saida" onclick="selecionarTipo(this)">
          <span class="tipo-dot"></span> Saída
        </button>
        <button class="tipo-btn" data-tipo="estudo" onclick="selecionarTipo(this)">
          <span class="tipo-dot"></span> Estudo
        </button>
      </div>
    </div>
  </div>
  <div class="card-footer">
    <div class="success-msg" id="sucesso">
      ✅ Salvo com sucesso
    </div>
    <button class="btn-save" id="btnSalvar" onclick="salvar()">
      <div class="spinner" id="spinner"></div>
      <span id="btnTexto">＋ Salvar</span>
    </button>
  </div>
</div>

<p class="footer-note">Conectado ao Firebase · <strong>brain-orcamento</strong></p>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyAE2VcJyqu01rtqlgVoMg634FFfTGxiRgc",
  authDomain: "brain-orcamento.firebaseapp.com",
  projectId: "brain-orcamento",
  storageBucket: "brain-orcamento.firebasestorage.app",
  messagingSenderId: "991853359315",
  appId: "1:991853359315:web:b2270aab447a853b212426"
});
const db = getFirestore(app);
let tipoAtual = "entrada";

window.selecionarTipo = (btn) => {
  document.querySelectorAll(".tipo-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  tipoAtual = btn.dataset.tipo;
};

window.salvar = async () => {
  const titulo = document.getElementById("titulo").value.trim();
  const valor  = document.getElementById("valor").value;
  const link   = document.getElementById("link").value.trim();
  const erro   = document.getElementById("erro");
  if (!titulo) { erro.classList.add("show"); return; }
  erro.classList.remove("show");
  const btn = document.getElementById("btnSalvar");
  const spinner = document.getElementById("spinner");
  const texto = document.getElementById("btnTexto");
  btn.disabled = true;
  spinner.style.display = "block";
  texto.textContent = "Salvando…";
  try {
    await addDoc(collection(db, "dados"), {
      titulo, valor: valor ? Number(valor) : 0,
      tipo: tipoAtual, link,
      criadoEm: new Date().toISOString()
    });
    document.getElementById("titulo").value = "";
    document.getElementById("valor").value  = "";
    document.getElementById("link").value   = "";
    document.querySelectorAll(".tipo-btn").forEach(b => b.classList.remove("active"));
    document.querySelector('[data-tipo="entrada"]').classList.add("active");
    tipoAtual = "entrada";
    const s = document.getElementById("sucesso");
    s.classList.add("show");
    setTimeout(() => s.classList.remove("show"), 3500);
  } catch(e) { alert("Erro: " + e.message); }
  finally {
    btn.disabled = false;
    spinner.style.display = "none";
    texto.textContent = "＋ Salvar";
  }
};
</script>
</body>
</html>
