<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>UI Library</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #fff;
  overflow-x: hidden;
}

/* MENU */
.navbar {
  display: flex;
  justify-content: space-between;
  padding: 15px 25px;
  border-bottom: 1px solid #eee;
  background: #fff;
  position: sticky;
  top: 0;
}

.logo {
  font-weight: bold;
}

.menu a {
  margin-left: 15px;
  text-decoration: none;
  color: #333;
  font-size: 14px;
}

/* HERO */
.hero {
  text-align: center;
  padding: 25px 20px 10px 20px;
}

.hero h1 {
  font-size: 24px;
}

.hero p {
  color: #666;
  font-size: 14px;
  margin-top: 8px;
}

/* FRASE NOVA */
.tagline {
  text-align: center;
  font-size: 13px;
  color: #999;
  margin-bottom: 20px;
}

/* CARROSSEL */
.marquee {
  overflow: hidden;
  width: 100%;
  padding: 30px 0;
}

.track {
  display: flex;
  width: max-content;
  animation: scroll 18s linear infinite;
}

.group {
  display: flex;
}

/* CARD */
.card {
  width: 240px;
  height: 440px;
  margin-right: 25px;
  border-radius: 22px;
  overflow: hidden;
  border: 1px solid #eee;
  box-shadow: 0 10px 25px rgba(0,0,0,0.05);
}

.card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* ANIMAÇÃO */
@keyframes scroll {
  0% { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}
</style>
</head>

<body>

<!-- MENU -->
<div class="navbar">
  <div class="logo">UI Library</div>
  <div class="menu">
    <a href="#">Home</a>
    <a href="#">Apps</a>
    <a href="#">Flows</a>
    <a href="#">Salvar</a>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <h1>Design UX Interface Library</h1>
  <p>Explore telas reais de apps estilo Mobbin</p>
</div>

<!-- FRASE NOVA -->
<div class="tagline">
  Desenvolvendo app • Telas • Criar ideias de interface moderna
</div>

<!-- CARROSSEL -->
<div class="marquee">
  <div class="track">

    <div class="group">
      <div class="card"><img src="https://images.unsplash.com/photo-1611162617474-5b21e879e113?w=600"></div>
      <div class="card"><img src="https://images.unsplash.com/photo-1551650975-87deedd944c3?w=600"></div>
      <div class="card"><img src="https://images.unsplash.com/photo-1559028012-481c04fa702d?w=600"></div>
      <div class="card"><img src="https://images.unsplash.com/photo-1551288049-bebda4e38f71?w=600"></div>
      <div class="card"><img src="https://images.unsplash.com/photo-1555774698-0b77e0d5fac6?w=600"></div>
      <div class="card"><img src="https://images.unsplash.com/photo-1556741533-f6acd647d2fb?w=600"></div>
    </div>

    <div class="group">
      <div class="card"><img src="https://images.unsplash.com/photo-1611162617474-5b21e879e113?w=600"></div>
      <div class="card"><img src="https://images.unsplash.com/photo-1551650975-87deedd944c3?w=600"></div>
      <div class="card"><img src="https://images.unsplash.com/photo-1559028012-481c04fa702d?w=600"></div>
      <div class="card"><img src="https://images.unsplash.com/photo-1551288049-bebda4e38f71?w=600"></div>
      <div class="card"><img src="https://images.unsplash.com/photo-1555774698-0b77e0d5fac6?w=600"></div>
      <div class="card"><img src="https://images.unsplash.com/photo-1556741533-f6acd647d2fb?w=600"></div>
    </div>

  </div>
</div>

</body>
</html>
